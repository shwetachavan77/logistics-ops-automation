<!DOCTYPE html>

  <script type="text/babel">

          savings && row("Rate Preservation", `${(100 - parseFloat(savings)).toFixed(1)}%`, parseFloat(savings) < 10 ? C.green : C.amber),
        )
      );
    }

    // Main app
    function App() {
      const [m, setM] = useState(null);
      const [tab, setTab] = useState("overview");
      const [selectedCall, setSelectedCall] = useState(null);
      const [loading, setLoading] = useState(true);

      const load = useCallback(async () => {
        try {
          const apiKey = new URLSearchParams(window.location.search).get("key") || "";
          const headers = apiKey ? { "x-api-key": apiKey } : {};
          const [mr, cr] = await Promise.all([
            fetch("/api/metrics", { headers }).catch(() => null),
            fetch("/api/calls/recent?limit=30", { headers }).catch(() => null),
          ]);
          if (mr?.ok && cr?.ok) {
            const md = await mr.json(); const cd = await cr.json();
            setM({ ...md, recent_calls: cd.calls || [] });
          } else setM(mockData());
        } catch { setM(mockData()); }
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);
