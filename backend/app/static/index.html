<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrier Sales Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06080D; --surface: #0D1117; --surface2: #151B25;
      --border: #1C2333; --border2: #2A3345;
      --text: #E6EDF3; --text2: #8B949E; --text3: #484F58;
      --cyan: #58A6FF; --cyan-dim: #1A3A5C;
      --green: #3FB950; --green-dim: #1A3D2B;
      --amber: #D29922; --amber-dim: #3D2E10;
      --red: #F85149; --red-dim: #3D1518;
      --purple: #BC8CFF; --purple-dim: #2A1A4A;
      --blue: #58A6FF;
    }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    const {
      BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid,
      Tooltip, ResponsiveContainer, AreaChart, Area, Legend
    } = Recharts;

    const C = {
      bg: "#06080D", surface: "#0D1117", surface2: "#151B25",
      border: "#1C2333", border2: "#2A3345",
      text: "#E6EDF3", text2: "#8B949E", text3: "#484F58",
      cyan: "#58A6FF", cyanDim: "#1A3A5C",
      green: "#3FB950", greenDim: "#1A3D2B",
      amber: "#D29922", amberDim: "#3D2E10",
      red: "#F85149", redDim: "#3D1518",
      purple: "#BC8CFF", purpleDim: "#2A1A4A",
      blue: "#58A6FF",
    };

    const OC = { booked: C.green, carrier_declined: C.amber, no_match: C.text3, negotiation_failed: C.red, verification_failed: C.purple, general_inquiry: C.blue };
    const OL = { booked: "Booked", carrier_declined: "Declined", no_match: "No Match", negotiation_failed: "Neg. Failed", verification_failed: "MC Failed", general_inquiry: "Rerouted" };
    const SC = { positive: C.green, neutral: C.blue, negative: C.amber, aggressive: C.red };

    function mockData() {
      const outcomes = { booked: 18, carrier_declined: 12, no_match: 10, negotiation_failed: 6, verification_failed: 4 };
      const sentiments = { positive: 20, neutral: 17, negative: 10, aggressive: 3 };
      const days = [];
      const now = new Date();
      for (let i = 13; i >= 0; i--) {
        const d = new Date(now); d.setDate(d.getDate() - i);
        const calls = Math.floor(Math.random() * 5) + 2;
        days.push({ date: d.toLocaleDateString("en-US", { month: "short", day: "numeric" }), calls, booked: Math.min(Math.floor(Math.random() * 3) + 1, calls) });
      }
      return {
        total_calls: 50, calls_by_outcome: outcomes, calls_by_sentiment: sentiments,
        booking_rate: 36.0, avg_negotiation_rounds: 1.8, avg_discount_from_loadboard: 4.2,
        revenue_booked: 48230, calls_over_time: days,
        top_lanes: [
          { origin: "Chicago, IL", destination: "Dallas, TX", calls: 8, bookings: 4 },
          { origin: "Los Angeles, CA", destination: "Phoenix, AZ", calls: 6, bookings: 3 },
          { origin: "Atlanta, GA", destination: "Miami, FL", calls: 5, bookings: 2 },
          { origin: "Houston, TX", destination: "Memphis, TN", calls: 4, bookings: 2 },
          { origin: "Newark, NJ", destination: "Boston, MA", calls: 3, bookings: 1 },
        ],
        recent_calls: [
          { call_id: "CALL-20260322-001", carrier_name: "Eagle Express Inc", carrier_mc: "482910", outcome: "booked", sentiment: "positive", agreed_rate: 2710, loadboard_rate: 2850, negotiation_rounds: 2, call_duration_seconds: 285, timestamp: "2026-03-22T14:32:00", load_id: "LD-1001" },
          { call_id: "CALL-20260322-002", carrier_name: "Lone Star Freight", carrier_mc: "391055", outcome: "carrier_declined", sentiment: "neutral", agreed_rate: null, loadboard_rate: 1450, negotiation_rounds: 1, call_duration_seconds: 142, timestamp: "2026-03-22T13:15:00", load_id: "LD-1002" },
          { call_id: "CALL-20260322-003", carrier_name: "Thunder Road Trucking", carrier_mc: "558432", outcome: "booked", sentiment: "positive", agreed_rate: 1750, loadboard_rate: 1800, negotiation_rounds: 1, call_duration_seconds: 195, timestamp: "2026-03-22T11:48:00", load_id: "LD-1003" },
          { call_id: "CALL-20260322-004", carrier_name: "Pacific Coast Logistics", carrier_mc: "672190", outcome: "no_match", sentiment: "neutral", agreed_rate: null, loadboard_rate: null, negotiation_rounds: 0, call_duration_seconds: 88, timestamp: "2026-03-22T10:22:00", load_id: null },
          { call_id: "CALL-20260322-005", carrier_name: "Iron Horse Freight", carrier_mc: "999999", outcome: "verification_failed", sentiment: "negative", agreed_rate: null, loadboard_rate: null, negotiation_rounds: 0, call_duration_seconds: 62, timestamp: "2026-03-22T09:05:00", load_id: null },
          { call_id: "CALL-20260321-001", carrier_name: "Blue Line Carriers", carrier_mc: "223847", outcome: "negotiation_failed", sentiment: "negative", agreed_rate: null, loadboard_rate: 2200, negotiation_rounds: 3, call_duration_seconds: 340, timestamp: "2026-03-21T16:40:00", load_id: "LD-1004" },
          { call_id: "CALL-20260321-002", carrier_name: "Summit Freight LLC", carrier_mc: "887654", outcome: "booked", sentiment: "positive", agreed_rate: 920, loadboard_rate: 950, negotiation_rounds: 1, call_duration_seconds: 155, timestamp: "2026-03-21T15:10:00", load_id: "LD-1005" },
          { call_id: "CALL-20260321-003", carrier_name: "Great Plains Transport", carrier_mc: "445512", outcome: "carrier_declined", sentiment: "aggressive", agreed_rate: null, loadboard_rate: 2100, negotiation_rounds: 2, call_duration_seconds: 210, timestamp: "2026-03-21T14:00:00", load_id: "LD-1007" },
          { call_id: "CALL-20260320-001", carrier_name: "Liberty Logistics", carrier_mc: "334521", outcome: "booked", sentiment: "positive", agreed_rate: 2350, loadboard_rate: 2400, negotiation_rounds: 2, call_duration_seconds: 270, timestamp: "2026-03-20T11:20:00", load_id: "LD-1011" },
          { call_id: "CALL-20260320-002", carrier_name: "Northwind Trucking", carrier_mc: "776543", outcome: "no_match", sentiment: "neutral", agreed_rate: null, loadboard_rate: null, negotiation_rounds: 0, call_duration_seconds: 95, timestamp: "2026-03-20T09:45:00", load_id: null },
        ],
      };
    }

    // Components
    function Badge({ label, color }) {
      return React.createElement("span", {
        style: { display: "inline-block", padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600, letterSpacing: "0.04em", textTransform: "uppercase", color, background: color + "15", border: `1px solid ${color}25` }
      }, label);
    }

    function ChartTip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return React.createElement("div", {
        style: { background: C.surface2, border: `1px solid ${C.border2}`, borderRadius: 6, padding: "8px 12px", boxShadow: "0 4px 16px rgba(0,0,0,0.5)" }
      },
        React.createElement("div", { style: { color: C.text2, fontSize: 10, marginBottom: 4 } }, label),
        ...payload.map((p, i) => React.createElement("div", { key: i, style: { color: p.color || C.text, fontSize: 12, fontWeight: 600 } }, `${p.name}: ${p.value}`))
      );
    }

    function KpiCard({ label, value, sub, color, trend }) {
      return React.createElement("div", {
        className: "fade-in",
        style: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 20px", position: "relative", overflow: "hidden", transition: "border-color 0.2s", cursor: "default" },
        onMouseEnter: e => e.currentTarget.style.borderColor = color || C.border2,
        onMouseLeave: e => e.currentTarget.style.borderColor = C.border,
      },
        React.createElement("div", { style: { position: "absolute", top: 0, left: 0, width: 3, height: "100%", background: color || C.cyan, borderRadius: "10px 0 0 10px" } }),
        React.createElement("div", { style: { color: C.text2, fontSize: 11, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8 } }, label),
        React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: 8 } },
          React.createElement("span", { className: "mono", style: { color: C.text, fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em" } }, value),
          trend && React.createElement("span", { style: { color: trend > 0 ? C.green : C.red, fontSize: 11, fontWeight: 600 } }, trend > 0 ? `+${trend}%` : `${trend}%`)
        ),
        sub && React.createElement("div", { style: { color: C.text3, fontSize: 11, marginTop: 4 } }, sub)
      );
    }

    function Panel({ title, subtitle, children, style }) {
      return React.createElement("div", {
        className: "fade-in",
        style: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", ...style }
      },
        React.createElement("div", { style: { padding: "14px 20px", borderBottom: `1px solid ${C.border}` } },
          React.createElement("div", { style: { fontSize: 13, fontWeight: 600, color: C.text } }, title),
          subtitle && React.createElement("div", { style: { fontSize: 11, color: C.text3, marginTop: 2 } }, subtitle)
        ),
        React.createElement("div", { style: { padding: 20 } }, children)
      );
    }

    // Call detail drawer
    function CallDrawer({ call, onClose }) {
      if (!call) return null;
      const [negRounds, setNegRounds] = useState([]);
      
      useEffect(() => {
        if (call && call.call_id) {
          const key = sessionStorage.getItem("dash_key") || "";
          fetch(`/api/calls/${encodeURIComponent(call.call_id)}/negotiations`, { headers: { "x-api-key": key } })
            .then(r => r.ok ? r.json() : null)
            .then(d => { if (d && d.rounds) setNegRounds(d.rounds); else setNegRounds([]); })
            .catch(() => setNegRounds([]));
        }
      }, [call]);

      const time = new Date(call.timestamp).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
      const dur = call.call_duration_seconds ? `${Math.floor(call.call_duration_seconds / 60)}:${String(call.call_duration_seconds % 60).padStart(2, "0")}` : "N/A";
      const savings = call.agreed_rate && call.real_loadboard_rate ? ((1 - call.agreed_rate / call.real_loadboard_rate) * 100).toFixed(1) : null;
      const delta = call.agreed_rate && call.real_loadboard_rate ? Math.round(call.agreed_rate - call.real_loadboard_rate) : null;

      const row = (label, value, color) => React.createElement("div", { style: { display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` } },
        React.createElement("span", { style: { color: C.text2, fontSize: 12 } }, label),
        React.createElement("span", { className: "mono", style: { color: color || C.text, fontSize: 12, fontWeight: 500 } }, value)
      );

      const section = (title) => React.createElement("div", { style: { fontSize: 11, fontWeight: 600, color: C.text3, textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 20, marginBottom: 8 } }, title);

      const rounds = negRounds;

      // Sentiment reasoning
      const sentimentReasons = {
        positive: "Carrier was cooperative, professional, and showed interest in working together.",
        neutral: "Carrier was business-like. Professional interaction with no strong positive or negative signals.",
        negative: "Carrier showed frustration with pricing or availability. May need rate adjustment on this lane.",
        aggressive: "Carrier was confrontational. Consider flagging for review before future interactions."
      };

      return React.createElement("div", {
        style: { position: "fixed", top: 0, right: 0, bottom: 0, width: 440, background: C.surface, borderLeft: `1px solid ${C.border}`, zIndex: 100, overflowY: "auto", boxShadow: "-8px 0 32px rgba(0,0,0,0.5)" }
      },
        // Header
        React.createElement("div", { style: { padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: C.surface, zIndex: 1 } },
          React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, "Call Details"),
          React.createElement("button", { onClick: onClose, style: { background: "none", border: "none", color: C.text2, fontSize: 18, cursor: "pointer", padding: "4px 8px" } }, "x")
        ),
        React.createElement("div", { style: { padding: 20 } },
          // Carrier info
          React.createElement("div", { style: { fontSize: 16, fontWeight: 600, marginBottom: 4 } }, call.carrier_name || "Unknown Carrier"),
          React.createElement("div", { className: "mono", style: { fontSize: 11, color: C.text3, marginBottom: 12 } }, `MC-${call.carrier_mc || "N/A"} | ${call.call_id}`),
          React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 8 } },
            React.createElement(Badge, { label: OL[call.outcome] || call.outcome, color: OC[call.outcome] || C.text3 }),
            React.createElement(Badge, { label: call.sentiment, color: SC[(call.sentiment || "").toLowerCase()] || C.text3 })
          ),

          // FMCSA Verification
          section("FMCSA Verification"),
          row("MC Number", call.carrier_mc ? `MC-${call.carrier_mc}` : "N/A"),
          row("Verification", call.outcome === "verification_failed" ? "FAILED" : "PASSED", call.outcome === "verification_failed" ? C.red : C.green),
          row("Company Match", call.carrier_name ? "Confirmed" : "Unknown", call.carrier_name ? C.green : C.text3),

          // Call Details
          section("Call Details"),
          row("Time", time),
          row("Duration", dur),
          row("Load ID", call.load_id || "No load discussed"),

          // Load Details
          call.load_id && React.createElement(React.Fragment, {},
            section("Shipment Details"),
            row("Load ID", call.load_id),
            row("Route", call.load_origin && call.load_destination ? `${call.load_origin} to ${call.load_destination}` : "N/A"),
            row("Equipment", call.load_equipment || "N/A"),
            row("Miles", call.load_miles ? `${Math.round(call.load_miles).toLocaleString()} mi` : "N/A"),
            row("Weight", call.load_weight ? `${Math.round(call.load_weight).toLocaleString()} lbs` : "N/A"),
            row("Commodity", call.load_commodity || "N/A"),
            row("Pieces", call.load_pieces || "N/A"),
            row("Dimensions", call.load_dimensions || "N/A"),
            row("Pickup", call.load_pickup ? new Date(call.load_pickup).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "N/A"),
            row("Delivery", call.load_delivery ? new Date(call.load_delivery).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "N/A"),
            row("Loadboard Rate", call.real_loadboard_rate ? `$${Math.round(call.real_loadboard_rate).toLocaleString()}` : "N/A"),
            row("Rate/Mile", call.real_loadboard_rate && call.load_miles ? `$${(call.real_loadboard_rate / call.load_miles).toFixed(2)}/mi` : "N/A", C.text2),
            call.load_notes && row("Load Notes", call.load_notes)
          ),

          // Negotiation History
          (rounds.length > 0) && React.createElement(React.Fragment, {},
            section("Negotiation History"),
            React.createElement("div", { style: { borderRadius: 6, overflow: "hidden", border: `1px solid ${C.border}`, marginBottom: 8 } },
              React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", background: C.surface2 } },
                React.createElement("div", { style: { padding: "6px 10px", fontSize: 10, color: C.text3, fontWeight: 600, textTransform: "uppercase" } }, "Round"),
                React.createElement("div", { style: { padding: "6px 10px", fontSize: 10, color: C.text3, fontWeight: 600, textTransform: "uppercase" } }, "Carrier Offer"),
                React.createElement("div", { style: { padding: "6px 10px", fontSize: 10, color: C.text3, fontWeight: 600, textTransform: "uppercase" } }, "Our Counter"),
                React.createElement("div", { style: { padding: "6px 10px", fontSize: 10, color: C.text3, fontWeight: 600, textTransform: "uppercase" } }, "Result")
              ),
              ...rounds.map((r, i) => React.createElement("div", { key: i, style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", borderTop: `1px solid ${C.border}` } },
                React.createElement("div", { className: "mono", style: { padding: "8px 10px", fontSize: 12, color: C.text } }, `Round ${r.round_number}`),
                React.createElement("div", { className: "mono", style: { padding: "8px 10px", fontSize: 12, color: C.amber } }, r.carrier_offer ? `$${Math.round(r.carrier_offer).toLocaleString()}` : "-"),
                React.createElement("div", { className: "mono", style: { padding: "8px 10px", fontSize: 12, color: C.cyan } }, r.our_counter ? `$${Math.round(r.our_counter).toLocaleString()}` : "-"),
                React.createElement("div", { style: { padding: "8px 10px", fontSize: 11 } }, React.createElement(Badge, { label: r.accepted ? "Accepted" : "Countered", color: r.accepted ? C.green : C.amber }))
              ))
            )
          ),

          // Outcome
          section("Outcome"),
          row("Final Result", OL[call.outcome] || call.outcome, OC[call.outcome] || C.text3),
          call.agreed_rate && row("Agreed Rate", `$${Math.round(call.agreed_rate).toLocaleString()}`, C.green),
          delta !== null && row("Rate Delta", delta >= 0 ? `+$${delta.toLocaleString()}` : `-$${Math.abs(delta).toLocaleString()}`, delta >= 0 ? C.red : C.green),
          savings && row("Rate Preservation", `${(100 - parseFloat(savings)).toFixed(1)}%`, parseFloat(savings) < 10 ? C.green : C.amber),
          call.initial_offer && row("Carrier Initial Ask", `$${Math.round(call.initial_offer).toLocaleString()}`),
          call.final_offer && row("Carrier Final Offer", `$${Math.round(call.final_offer).toLocaleString()}`),

          // Sentiment
          section("Sentiment Analysis"),
          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 8 } },
            React.createElement("div", { style: { width: 32, height: 32, borderRadius: 8, background: (SC[(call.sentiment || "").toLowerCase()] || C.text3) + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 } },
              (call.sentiment || "").toLowerCase() === "positive" ? "+" : (call.sentiment || "").toLowerCase() === "negative" ? "-" : (call.sentiment || "").toLowerCase() === "aggressive" ? "!" : "~"
            ),
            React.createElement("div", {},
              React.createElement("div", { style: { fontSize: 13, fontWeight: 600, color: SC[(call.sentiment || "").toLowerCase()] || C.text3, textTransform: "capitalize" } }, call.sentiment),
              React.createElement("div", { style: { fontSize: 11, color: C.text3, marginTop: 2, lineHeight: 1.4 } }, sentimentReasons[(call.sentiment || "").toLowerCase()] || "No sentiment data available.")
            )
          ),

          // Notes
          call.notes && React.createElement(React.Fragment, {},
            section("Notes"),
            React.createElement("div", { style: { fontSize: 12, color: C.text2, lineHeight: 1.5, padding: "8px 10px", background: C.surface2, borderRadius: 6 } }, call.notes)
          ),

          // Transcript
          call.transcript && React.createElement(React.Fragment, {},
            section("Transcript"),
            React.createElement("div", { style: { fontSize: 11, color: C.text2, lineHeight: 1.6, padding: "10px 12px", background: C.surface2, borderRadius: 6, maxHeight: 300, overflowY: "auto", whiteSpace: "pre-wrap", fontFamily: "'DM Sans', sans-serif" } }, call.transcript)
          ),

          // SMS Confirmation
          call.sms_text && React.createElement(React.Fragment, {},
            section("SMS Sent"),
            React.createElement("div", { style: { fontSize: 12, color: C.text2, lineHeight: 1.5, padding: "8px 10px", background: C.surface2, borderRadius: 6, display: "flex", gap: 8, alignItems: "flex-start" } },
              React.createElement("span", { style: { fontSize: 14, flexShrink: 0 } }, "\uD83D\uDCF1"),
              React.createElement("span", {}, call.sms_text)
            )
          )
        )
      );
    }

    // Main app
    function App() {
      const [m, setM] = useState(null);
      const [tab, setTab] = useState("overview");
      const [selectedCall, setSelectedCall] = useState(null);
      const [loading, setLoading] = useState(true);
      const [demo, setDemo] = useState(false);
      const [filter, setFilter] = useState(["All"]);
      const [sortBy, setSortBy] = useState("time_desc");
      const [liveCalls, setLiveCalls] = useState(0);
      const [allLoads, setAllLoads] = useState([]);
      const [laneFilter, setLaneFilter] = useState(null);

      const [authed, setAuthed] = useState(() => sessionStorage.getItem("dash_auth") === "1");
      const [pw, setPw] = useState("");
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState("");

      const getKey = () => new URLSearchParams(window.location.search).get("key") || sessionStorage.getItem("dash_key") || "";

      useEffect(() => {
        const poll = setInterval(async () => {
          try {
            const r = await fetch("/api/calls/recent?limit=1", { headers: { "x-api-key": sessionStorage.getItem("dash_key") || "" } });
            if (r?.ok) {
              const d = await r.json();
              const recent = d.calls?.[0];
              if (recent) {
                const age = (Date.now() - new Date(recent.timestamp).getTime()) / 1000;
                setLiveCalls(age < 300 ? 1 : 0);
              }
            }
          } catch {}
        }, 10000);
        return () => clearInterval(poll);
      }, []);

      const load = useCallback(async () => {
        if (!authed) { setLoading(false); return; }
        if (demo) { setM(mockData()); setLoading(false); return; }
        try {
          const apiKey = getKey();
          const headers = apiKey ? { "x-api-key": apiKey } : {};
          const [mr, cr, lr] = await Promise.all([
            fetch("/api/metrics", { headers }).catch(() => null),
            fetch("/api/calls/recent?limit=30", { headers }).catch(() => null),
            fetch("/api/loads/all", { headers }).catch(() => null),
          ]);
          if (mr?.ok && cr?.ok) {
            const md = await mr.json(); const cd = await cr.json();
            setM({ ...md, recent_calls: cd.calls || [] });
          } else { setM(null); }
          if (lr?.ok) { const ld = await lr.json(); setAllLoads(ld.loads || []); }
        } catch { setM(null); }
        setLoading(false);
      }, [demo, authed]);

      useEffect(() => { load(); }, [load]);

      // Auto-auth from URL key param
      useEffect(() => {

                  if (r?.ok) { const d = await r.json(); alert(`Reseeded ${d.loads_seeded} loads with current dates.`); load(); }
                  else alert("Reseed failed.");
                },
                style: { padding: "5px 12px", borderRadius: 6, border: `1px solid ${C.cyan}25`, background: C.cyanDim, color: C.cyan, fontSize: 11, cursor: "pointer", fontWeight: 500 }
              }, "Reseed Loads")
            ),
            React.createElement(Panel, { title: "" },
              allLoads.length === 0
                ? React.createElement("div", { style: { textAlign: "center", padding: "30px 0", color: C.text3, fontSize: 12 } }, "No loads in database. Click Reseed Loads to populate.")
                : React.createElement("div", { style: { overflowX: "auto", margin: "-20px", padding: 0 } },
                    React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 11 } },
                      React.createElement("thead", {},
                        React.createElement("tr", { style: { borderBottom: `1px solid ${C.border}` } },
                          ["ID", "Origin", "Destination", "Equipment", "Rate", "Miles", "Weight", "Commodity", "Pieces", "Pickup", "Status"].map(h =>
                            React.createElement("th", { key: h, style: { padding: "8px 10px", textAlign: "left", color: C.text3, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.05em", whiteSpace: "nowrap" } }, h)
                          )
                        )
                      ),
                      React.createElement("tbody", {},
                        allLoads.map((ld, i) => React.createElement("tr", {
                          key: ld.load_id || i,
                          style: { borderBottom: `1px solid ${C.border}` }
                        },
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.cyan, fontWeight: 500 } }, ld.load_id),
                          React.createElement("td", { style: { padding: "7px 10px", color: C.text } }, ld.origin),
                          React.createElement("td", { style: { padding: "7px 10px", color: C.text } }, ld.destination),
                          React.createElement("td", { style: { padding: "7px 10px", color: C.text2 } }, ld.equipment_type),
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.green } }, ld.loadboard_rate ? `$${Math.round(parseFloat(ld.loadboard_rate)).toLocaleString()}` : "-"),
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.text2 } }, ld.miles ? `${Math.round(parseFloat(ld.miles))}` : "-"),
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.text2 } }, ld.weight ? `${Math.round(parseFloat(ld.weight)).toLocaleString()}` : "-"),
                          React.createElement("td", { style: { padding: "7px 10px", color: C.text2 } }, ld.commodity_type || "-"),
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.text2, textAlign: "center" } }, ld.num_of_pieces || "-"),
                          React.createElement("td", { className: "mono", style: { padding: "7px 10px", color: C.text2, fontSize: 10 } }, ld.pickup_datetime ? new Date(ld.pickup_datetime).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "-"),
                          React.createElement("td", { style: { padding: "7px 10px" } }, React.createElement(Badge, { label: ld.is_available ? "Available" : "Booked", color: ld.is_available ? C.green : C.amber }))
                        ))
                      )
                    )
                  )
            )
          ),

          // PERFORMANCE
          tab === "performance" && React.createElement("div", { style: { minHeight: 200 } },
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 12 } },
              React.createElement(Panel, { title: "Rate Preservation" },
                React.createElement("div", { className: "mono", style: { fontSize: 40, fontWeight: 700, color: C.green, textAlign: "center", padding: "20px 0" } }, `${ratePreservation}%`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "AI secured this percentage of the loadboard rate on average")
              ),
              React.createElement(Panel, { title: "Avg Call Duration" },
                React.createElement("div", { className: "mono", style: { fontSize: 40, fontWeight: 700, color: C.cyan, textAlign: "center", padding: "20px 0" } }, m.avg_call_duration ? `${Math.floor(m.avg_call_duration / 60)}:${String(Math.round(m.avg_call_duration % 60)).padStart(2, "0")}` : avgCallDur),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "From greeting to resolution")
              ),
              React.createElement(Panel, { title: "Cost per Booking" },
                React.createElement("div", { className: "mono", style: { fontSize: 40, fontWeight: 700, color: C.purple, textAlign: "center", padding: "20px 0" } }, "$0.77"),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "vs $15-25 per call with a human rep")
              )
            ),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 12 } },
              React.createElement(Panel, { title: "Round 1 Close Rate" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: C.green, textAlign: "center", padding: "14px 0" } }, `${m.round1_close_rate || 0}%`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Carriers accepting first offer")
              ),
              React.createElement(Panel, { title: "Floor Rate Hits" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: m.floor_rate_hit_rate > 20 ? C.amber : C.green, textAlign: "center", padding: "14px 0" } }, `${m.floor_rate_hit_rate || 0}%`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Deals closed at or near floor")
              ),
              React.createElement(Panel, { title: "Avg Rate Conceded" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: C.amber, textAlign: "center", padding: "14px 0" } }, `$${m.avg_rate_given_up || 0}`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Avg $ given up per booked deal")
              ),
              React.createElement(Panel, { title: "Avg Rounds to Close" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: C.cyan, textAlign: "center", padding: "14px 0" } }, `${m.avg_negotiation_rounds || 0}`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Negotiation rounds per deal")
              )
            ),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 12 } },
              React.createElement(Panel, { title: "Failed Vetting Rate" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: m.total_calls > 0 && (m.calls_by_outcome.verification_failed || 0) / m.total_calls * 100 > 15 ? C.red : C.amber, textAlign: "center", padding: "14px 0" } }, `${m.total_calls > 0 ? ((m.calls_by_outcome.verification_failed || 0) / m.total_calls * 100).toFixed(1) : 0}%`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Callers failing FMCSA verification")
              ),
              React.createElement(Panel, { title: "Carrier Sentiment" },
                React.createElement("div", { style: { display: "flex", justifyContent: "center", gap: 12, padding: "14px 0" } },
                  Object.entries(m.calls_by_sentiment || {}).map(([k, v], i) => React.createElement("div", { key: i, style: { textAlign: "center" } },
                    React.createElement("div", { className: "mono", style: { fontSize: 18, fontWeight: 700, color: SC[k.toLowerCase()] || C.text } }, v),
                    React.createElement("div", { style: { fontSize: 9, color: C.text3, textTransform: "uppercase", marginTop: 2 } }, k)
                  ))
                )
              ),
              React.createElement(Panel, { title: "Top Equipment Demand" },
                React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 6, padding: "10px 0" } },
                  ["Dry Van", "Reefer", "Flatbed"].map((eq, i) => React.createElement("div", { key: i, style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
                    React.createElement("span", { style: { fontSize: 11, color: C.text2 } }, eq),
                    React.createElement("div", { style: { width: "60%", height: 6, background: C.surface2, borderRadius: 3, overflow: "hidden" } },
                      React.createElement("div", { style: { width: `${[65, 22, 13][i]}%`, height: "100%", background: [C.cyan, C.green, C.amber][i], borderRadius: 3 } })
                    )
                  ))
                )
              ),
              React.createElement(Panel, { title: "Repeat Carrier Rate" },
                React.createElement("div", { className: "mono", style: { fontSize: 32, fontWeight: 700, color: C.green, textAlign: "center", padding: "14px 0" } }, `${m.repeat_carrier_rate || 0}%`),
                React.createElement("div", { style: { textAlign: "center", color: C.text2, fontSize: 11 } }, "Carriers calling back = trust")
              )
            ),
            React.createElement(Panel, { title: "AI vs Human Performance", subtitle: "Estimated comparison based on industry benchmarks" },
              React.createElement("div", { style: { display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 0 } },
                ...[
                  ["Metric", "AI Agent", "Human Rep", true],
                  ["Answer Rate", "100%", "~65%", false],
                  ["Avg Response Time", "0 sec", "45-90 sec", false],
                  ["Cost per Call", "$0.77", "$15-25", false],
                  ["Calls/Hour Capacity", "Unlimited", "8-12", false],
                  ["Consistency", "100%", "Variable", false],
                  ["24/7 Availability", "Yes", "No", false],
                ].map(([metric, ai, human, isHeader], i) =>
                  React.createElement(React.Fragment, { key: i },
                    React.createElement("div", { style: { padding: "10px 12px", borderBottom: `1px solid ${C.border}`, color: isHeader ? C.text2 : C.text, fontSize: 12, fontWeight: isHeader ? 600 : 400, textTransform: isHeader ? "uppercase" : "none", letterSpacing: isHeader ? "0.05em" : "0", background: isHeader ? C.surface2 : "transparent" } }, metric),
                    React.createElement("div", { style: { padding: "10px 12px", borderBottom: `1px solid ${C.border}`, color: isHeader ? C.text2 : C.green, fontSize: 12, fontWeight: isHeader ? 600 : 500, textAlign: "center", textTransform: isHeader ? "uppercase" : "none", letterSpacing: isHeader ? "0.05em" : "0", background: isHeader ? C.surface2 : "transparent" } }, ai),
                    React.createElement("div", { style: { padding: "10px 12px", borderBottom: `1px solid ${C.border}`, color: isHeader ? C.text2 : C.text3, fontSize: 12, fontWeight: isHeader ? 600 : 400, textAlign: "center", textTransform: isHeader ? "uppercase" : "none", letterSpacing: isHeader ? "0.05em" : "0", background: isHeader ? C.surface2 : "transparent" } }, human)
                  )
                )
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
