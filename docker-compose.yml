# Carrier Sales System - Docker Compose

#
# Usage:
#   docker compose up --build
#   API:       http://localhost:8000/docs
#   Dashboard: http://localhost:3000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carrier_sales
      POSTGRES_USER: carrier_user
      POSTGRES_PASSWORD: carrier_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrier_user -d carrier_sales"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://carrier_user:carrier_pass@db:5432/carrier_sales
      API_KEY: ${API_KEY:-carrier-sales-dev-key-2026}
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
